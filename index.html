<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/site-icon.svg" />
    <link rel="shortcut icon" href="/site-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Reliable electrical and plumbing services for residential and commercial projects in Adimali, Idukki, Kerala."
    />
    <meta name="theme-color" content="#ffffff" />
    <meta name="robots" content="index, follow" />
    <title>Expert Electrical & Plumbing Services | Siva Electricals Constructions</title>

    <!-- Apply saved theme before paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("siva-theme");
          var dark =
            stored === "dark" ||
            (!stored &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) {
            document.documentElement.classList.add("dark");
            document.documentElement.style.colorScheme = "dark";
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute("content", "#0a0f1c");
          }
        } catch (e) {}
      })();
    </script>

    <link rel="dns-prefetch" href="//api.emailjs.com" />
    <link rel="dns-prefetch" href="//www.google.com" />
    <link rel="dns-prefetch" href="//www.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f7fafc;
        color: #1e293b;
        font-family: Inter, system-ui, sans-serif;
        z-index: 9999;
      }
      html.dark #app-loading {
        background: #0a0f1c;
        color: #e2e8f0;
      }
      #app-loading .loader-wrap {
        text-align: center;
      }
      #app-loading .spinner {
        width: 46px;
        height: 46px;
        border-radius: 9999px;
        border: 4px solid rgba(15, 111, 230, 0.18);
        border-top-color: #0f6fe6;
        margin: 0 auto 14px;
        animation: spin 0.9s linear infinite;
      }
      #app-loading .brand {
        font-family: Sora, Inter, sans-serif;
        font-weight: 700;
        font-size: 20px;
        letter-spacing: -0.01em;
      }
      #app-loading .brand span {
        color: #f8910a;
      }
      #app-loading .sub {
        margin-top: 6px;
        font-size: 13px;
        opacity: 0.7;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loading">
      <div class="loader-wrap">
        <div class="spinner"></div>
        <div class="brand">Siva <span>Electricals</span></div>
        <div class="sub">Loading…</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
